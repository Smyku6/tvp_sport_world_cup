name: Scrape TVP Sport highlights

on:
  schedule:
    # 3h po każdym możliwym kickoffie (czas polski - 2h = UTC)
    # Pokrywa wszystkie sloty meczowe Mundialu 2026
    # Pominięte: 8-18 UTC (10-20 CEST) — brak meczów
    - cron: "0 0,1,2,3,4,5,6,7,19,20,21,22,23 * 6-7 *"
  workflow_dispatch: # ręczne odpalenie

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run scraper
        run: node scraper.mjs

      - name: Commit & push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --cached --quiet || git commit -m "Update highlights data"
          git push
