<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 260px;
      padding: 16px;
      font-family: Arial, sans-serif;
      background: #1a1a2e;
      color: #eee;
      margin: 0;
    }
    h2 {
      margin: 0 0 8px;
      font-size: 16px;
      color: #e94560;
    }
    p {
      font-size: 13px;
      line-height: 1.4;
      margin: 0;
      color: #aaa;
    }
    .keyword {
      color: #e94560;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h2>TVP Sport — Tylko Skróty</h2>
  <p>
    Rozszerzenie filtruje stronę
    <strong>sport.tvp.pl/wideo</strong>
    i pokazuje tylko filmy zawierające słowo
    <span class="keyword">SKRÓT</span> w tytule.
  </p>
  <p style="margin-top: 10px;">
    Kliknij czerwony badge na stronie, żeby włączyć/wyłączyć filtr.
  </p>
</body>
</html>
